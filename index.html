<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Geo-Targeting Tool</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #0f172a; font-size: 14px; }
        #app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
        .sub { font-size: 13px; color: #64748b; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1rem 1.25rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media(max-width: 700px) { .grid { grid-template-columns: 1fr; } }
        label { font-size: 12px; color: #64748b; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; color: #0f172a; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
        button { padding: 7px 16px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; color: #0f172a; cursor: pointer; font-size: 13px; transition: background 0.15s; }
        button:hover { background: #f1f5f9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #378ADD; border-color: #378ADD; color: #fff; }
        .btn-primary:hover { background: #185FA5; border-color: #185FA5; color: #fff; }
        .btn-success { background: #639922; border-color: #639922; color: #fff; font-weight: 600; }
        .btn-success:hover { background: #3B6D11; border-color: #3B6D11; color: #fff; }
        #map { height: 480px; width: 100%; border-radius: 8px; cursor: crosshair; }
        .search-wrap { position: relative; }
        .dropdown { position: absolute; z-index: 9999; width: 100%; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 4px; max-height: 260px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.1); display: none; }
        .dropdown-item { padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 8px; }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: #f8fafc; }
        .type-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
        .type-country { background: #E6F1FB; color: #0C447C; }
        .type-region  { background: #EAF3DE; color: #27500A; }
        .type-city    { background: #EEEDFE; color: #3C3489; }
        .type-zip     { background: #FAEEDA; color: #633806; }
        .loc-row { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; position: relative; transition: border-color 0.15s; }
        .loc-row:hover { border-color: #93c5fd; }
        .loc-name { font-weight: 600; font-size: 13px; margin-bottom: 5px; padding-right: 24px; }
        .loc-meta { font-size: 11px; color: #94a3b8; margin-bottom: 7px; }
        .loc-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .loc-controls input[type=number] { width: 68px; }
        .remove-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #94a3b8; cursor: pointer; padding: 2px; font-size: 18px; line-height: 1; }
        .remove-btn:hover { color: #ef4444; background: none; }
        .estimate-row { margin-top: 8px; padding: 6px 10px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .result-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .result-card { background: #eff6ff; border-radius: 8px; padding: 12px 16px; }
        .result-label { font-size: 11px; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 4px; }
        .result-val { font-size: 26px; font-weight: 700; color: #1e293b; }
        .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(55,138,221,0.3); border-top-color: #378ADD; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        @media(max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
        .section-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: #475569; }
        .toggle-link { font-size: 12px; color: #378ADD; cursor: pointer; background: none; border: none; padding: 0; }
        .toggle-link:hover { text-decoration: underline; background: none; }
        .notice { font-size: 12px; color: #64748b; background: #f8fafc; padding: 8px 10px; border-radius: 8px; margin-top: 8px; }
        .notice.warn { border-left: 3px solid #f59e0b; color: #92400e; background: #fffbeb; }
        .flex-row { display: flex; gap: 8px; align-items: center; }
        .flex-row input { flex: 1; }
        .type-filters { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .type-filter-label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #475569; cursor: pointer; }
        .type-filter-label input[type=checkbox] { width: auto; cursor: pointer; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
    </style>
</head>
<body>

<div id="app">
    <div class="header-row">
        <div>
            <h1>Meta Geo-Targeting</h1>
            <p class="sub">Sök platser via Meta's API eller klicka i kartan</p>
        </div>
        <button class="toggle-link" onclick="toggleSettings()">⚙ Inställningar</button>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="card" style="margin-bottom:1rem;display:none">
        <p class="section-title">Meta API-konfiguration</p>
        <div class="settings-grid">
            <div><label>Ad Account ID</label><input id="ad-account-id" type="text" placeholder="462698..."></div>
            <div><label>Access Token</label><input id="access-token" type="password" placeholder="EAAVHAHiX4..."></div>
            <div><label>API-version</label><input id="api-version" type="text" value="v21.0"></div>
        </div>
        <div style="margin-top:10px;display:flex;justify-content:flex-end;gap:8px">
            <button onclick="toggleSettings()">Avbryt</button>
            <button class="btn-primary" onclick="saveSettings()">Spara</button>
        </div>
    </div>

    <div class="grid">
        <!-- Left column -->
        <div style="display:flex;flex-direction:column;gap:1rem">

            <!-- Search -->
            <div class="card">
                <p class="section-title">Sök plats</p>
                <div class="type-filters">
                    <label class="type-filter-label"><input type="checkbox" id="chk-country" checked> <span class="type-badge type-country">Land</span></label>
                    <label class="type-filter-label"><input type="checkbox" id="chk-region" checked> <span class="type-badge type-region">Region</span></label>
                    <label class="type-filter-label"><input type="checkbox" id="chk-city" checked> <span class="type-badge type-city">Stad</span></label>
                    <label class="type-filter-label"><input type="checkbox" id="chk-zip" checked> <span class="type-badge type-zip">Postnr</span></label>
                </div>
                <div class="flex-row search-wrap">
                    <input id="location-search" type="text" placeholder="Ex: Stockholm, SE-11122...">
                    <button class="btn-primary" id="search-btn" onclick="searchLocation()">Sök</button>
                    <div id="search-dropdown" class="dropdown"></div>
                </div>
                <div id="search-status" class="notice" style="display:none"></div>
            </div>

            <!-- Audience filters -->
            <div class="card">
                <p class="section-title">Målgrupp</p>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end">
                    <div>
                        <label>Ålder från</label>
                        <select id="age-min">
                            <option value="18" selected>18</option>
                            <option value="21">21</option><option value="25">25</option>
                            <option value="30">30</option><option value="35">35</option>
                            <option value="40">40</option><option value="45">45</option>
                            <option value="50">50</option><option value="55">55</option>
                            <option value="60">60</option><option value="65">65</option>
                        </select>
                    </div>
                    <div>
                        <label>Ålder till</label>
                        <select id="age-max">
                            <option value="20">20</option><option value="24">24</option>
                            <option value="29">29</option><option value="34">34</option>
                            <option value="39">39</option><option value="44">44</option>
                            <option value="49">49</option><option value="54">54</option>
                            <option value="59">59</option><option value="64">64</option>
                            <option value="65" selected>65+</option>
                        </select>
                    </div>
                    <div>
                        <label>Kön</label>
                        <select id="gender">
                            <option value="0">Alla kön</option>
                            <option value="1">Män</option>
                            <option value="2">Kvinnor</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Locations list -->
            <div class="card" style="flex:1">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                    <p class="section-title" style="margin:0">Valda platser (<span id="loc-count">0</span>)</p>
                </div>
                <div id="locations-list" style="max-height:400px;overflow-y:auto"></div>
                <div style="margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0">
                    <button class="btn-success" style="width:100%;display:flex;align-items:center;justify-content:center;gap:6px" id="calc-btn" onclick="calculateReach()">
                        ⚡ Beräkna räckvidd
                    </button>
                </div>
                <!-- Results -->
                <div id="results-panel" style="display:none;margin-top:12px">
                    <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:#475569">Totalt estimerat resultat</div>
                    <div class="result-cards">
                        <div class="result-card"><div class="result-label">Lägsta</div><div class="result-val" id="res-lower">-</div></div>
                        <div class="result-card"><div class="result-label">Högsta</div><div class="result-val" id="res-upper">-</div></div>
                    </div>
                    <p id="res-note" class="notice" style="margin-top:8px"></p>
                </div>
            </div>
        </div>

        <!-- Right column: Map -->
        <div class="card" style="padding:6px">
            <div id="map"></div>
            <p class="sub" style="padding:6px 8px;font-size:11px">💡 Klicka i kartan för att lägga till en koordinatbaserad pin</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- State ---
    let locations = [];
    let map, circleGroup;

    const TYPE_LABELS  = { country: 'Land', region: 'Region', city: 'Stad', zip: 'Postnr', custom: 'Pin' };
    const TYPE_CLASSES = { country: 'type-country', region: 'type-region', city: 'type-city', zip: 'type-zip', custom: 'type-city' };

    // --- Init ---
    window.onload = () => {
        initMap();
        loadSettings();
        document.getElementById('location-search').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchLocation();
        });
        document.addEventListener('click', e => {
            if (!e.target.closest('.search-wrap')) {
                document.getElementById('search-dropdown').style.display = 'none';
            }
        });
        // Default location
        addLocation({ key: '2673730', name: 'Stockholm', type: 'city', country_code: 'SE', country_name: 'Sweden', region: 'Stockholm County', supports_radius: true, suggested_radius: 17 }, true);
    };

    function initMap() {
        map = L.map('map').setView([59.33, 18.07], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        circleGroup = L.layerGroup().addTo(map);
        map.on('click', e => {
            const { lat, lng } = e.latlng;
            addLocation({
                key: null,
                name: 'Pin ' + lat.toFixed(3) + ', ' + lng.toFixed(3),
                type: 'custom',
                lat, lon: lng,
                supports_radius: true,
                suggested_radius: 10
            }, false);
        });
    }

    // --- Settings ---
    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function saveSettings() {
        localStorage.setItem('meta_geo_settings', JSON.stringify({
            adAccountId: document.getElementById('ad-account-id').value.trim(),
            accessToken: document.getElementById('access-token').value.trim(),
            apiVersion: document.getElementById('api-version').value.trim()
        }));
        toggleSettings();
    }

    function loadSettings() {
        const s = localStorage.getItem('meta_geo_settings');
        if (s) {
            const p = JSON.parse(s);
            if (p.adAccountId) document.getElementById('ad-account-id').value = p.adAccountId;
            if (p.accessToken)  document.getElementById('access-token').value  = p.accessToken;
            if (p.apiVersion)   document.getElementById('api-version').value   = p.apiVersion;
        }
    }

    // --- Search via Meta Targeting Search API ---
    async function searchLocation() {
        const q       = document.getElementById('location-search').value.trim();
        const token   = document.getElementById('access-token').value.trim();
        const version = document.getElementById('api-version').value.trim() || 'v21.0';
        const status  = document.getElementById('search-status');
        const btn     = document.getElementById('search-btn');

        if (q.length < 2) return;

        if (!token) {
            status.textContent = 'Fyll i Access Token i inställningar för att söka via Meta. Du kan också klicka direkt i kartan.';
            status.className = 'notice warn';
            status.style.display = 'block';
            return;
        }

        status.style.display = 'none';
        btn.disabled = true;
        btn.textContent = '...';

        const types = [];
        if (document.getElementById('chk-country').checked) types.push('country');
        if (document.getElementById('chk-region').checked)  types.push('region');
        if (document.getElementById('chk-city').checked)    types.push('city');
        if (document.getElementById('chk-zip').checked)     types.push('zip');

        try {
            const url = `https://graph.facebook.com/${version}/search`
                      + `?type=adgeolocation`
                      + `&q=${encodeURIComponent(q)}`
                      + `&location_types=${encodeURIComponent(JSON.stringify(types))}`
                      + `&access_token=${token}`;
            const res  = await fetch(url);
            const json = await res.json();
            if (json.error) throw new Error(json.error.message);
            showDropdown(json.data || []);
        } catch (err) {
            status.textContent = 'Sökfel: ' + err.message;
            status.className = 'notice warn';
            status.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sök';
        }
    }

    function showDropdown(results) {
        const dd = document.getElementById('search-dropdown');
        dd.innerHTML = '';
        if (!results.length) {
            dd.innerHTML = '<div class="dropdown-item" style="color:#94a3b8">Inga träffar hittades</div>';
            dd.style.display = 'block';
            return;
        }
        results.forEach(r => {
            const item       = document.createElement('div');
            item.className   = 'dropdown-item';
            const typeClass  = TYPE_CLASSES[r.type] || 'type-city';
            const typeLabel  = TYPE_LABELS[r.type]  || r.type;
            const subtitle   = [r.region, r.country_name].filter(Boolean).join(', ');
            item.innerHTML   = `
                <span class="type-badge ${typeClass}">${typeLabel}</span>
                <div>
                    <div style="font-size:13px;font-weight:500">${r.name}${r.primary_city ? ', ' + r.primary_city : ''}</div>
                    <div style="font-size:11px;color:#94a3b8">${subtitle}</div>
                </div>`;
            item.onclick = () => {
                addLocation(r, true);
                dd.style.display = 'none';
                document.getElementById('location-search').value = '';
            };
            dd.appendChild(item);
        });
        dd.style.display = 'block';
    }

    // --- Location Management ---
    function addLocation(r, fitMap) {
        const loc = {
            id:              crypto.randomUUID(),
            key:             r.key             || null,
            name:            r.name,
            type:            r.type            || 'custom',
            country_code:    r.country_code    || '',
            country_name:    r.country_name    || '',
            region:          r.region          || '',
            lat:             parseFloat(r.latitude  || r.lat || 0),
            lon:             parseFloat(r.longitude || r.lon || 0),
            rad:             r.suggested_radius || 17,
            supports_radius: r.supports_radius || r.type === 'city' || r.type === 'custom',
            include:         true,
            estimate:        null,
            loading:         false
        };
        locations.push(loc);
        renderLocations();
        updateMap(fitMap);
    }

    function removeLocation(id) {
        locations = locations.filter(l => l.id !== id);
        renderLocations();
        updateMap(false);
    }

    function updateLoc(id, key, val) {
        const loc = locations.find(l => l.id === id);
        if (loc) { loc[key] = val; loc.estimate = null; }
        updateMap(false);
        renderLocations();
    }

    function renderLocations() {
        const list = document.getElementById('locations-list');
        document.getElementById('loc-count').textContent = locations.length;

        if (!locations.length) {
            list.innerHTML = '<p style="font-size:12px;color:#94a3b8;text-align:center;padding:24px 0">Inga platser valda ännu</p>';
            return;
        }

        renderOverlapWarning();
        list.innerHTML = '';
        locations.forEach(loc => {
            const div        = document.createElement('div');
            div.className    = 'loc-row';
            const typeClass  = TYPE_CLASSES[loc.type] || 'type-city';
            const typeLabel  = TYPE_LABELS[loc.type]  || loc.type;
            const subtitle   = [loc.region, loc.country_name].filter(Boolean).join(', ');

            let estimateHtml = '';
            if (loc.loading) {
                estimateHtml = `<div class="estimate-row"><span style="color:#64748b">Hämtar räckvidd...</span><span class="spinner"></span></div>`;
            } else if (loc.estimate) {
                estimateHtml = `<div class="estimate-row">
                    <span style="color:#64748b">Estimerad räckvidd</span>
                    <span style="font-weight:600;color:#185FA5">${loc.estimate.lower.toLocaleString()} – ${loc.estimate.upper.toLocaleString()}</span>
                </div>`;
            }

            const radiusHtml = loc.supports_radius
                ? `<input type="number" value="${loc.rad}" min="1" max="80" style="width:68px" onchange="updateLoc('${loc.id}','rad',parseInt(this.value))">
                   <span style="font-size:11px;color:#94a3b8">km radie</span>`
                : `<span style="font-size:11px;color:#94a3b8">Hel ${typeLabel.toLowerCase()}</span>`;

            div.innerHTML = `
                <button class="remove-btn" onclick="removeLocation('${loc.id}')" title="Ta bort">×</button>
                <div class="loc-name">
                    <span class="type-badge ${typeClass}" style="margin-right:6px">${typeLabel}</span>${loc.name}
                </div>
                <div class="loc-meta">${subtitle}${loc.key ? ' · ID: ' + loc.key : ''}</div>
                <div class="loc-controls">
                    ${radiusHtml}
                    <select style="flex:1;min-width:130px" onchange="updateLoc('${loc.id}','include',this.value==='true')">
                        <option value="true"  ${loc.include  ? 'selected' : ''}>Inkludera</option>
                        <option value="false" ${!loc.include ? 'selected' : ''}>Exkludera</option>
                    </select>
                </div>
                ${estimateHtml}
            `;
            list.appendChild(div);
        });
    }

    // --- Map ---
    function updateMap(fit) {
        circleGroup.clearLayers();
        const valid = locations.filter(l => l.lat && l.lon);
        valid.forEach(p => {
            const color = p.include ? '#378ADD' : '#E24B4A';
            if (p.supports_radius && p.rad) {
                L.circle([p.lat, p.lon], {
                    color, fillColor: color, fillOpacity: 0.12, weight: 2,
                    radius: p.rad * 1000
                }).addTo(circleGroup).bindPopup(`<b>${p.name}</b><br>${p.rad} km`);
            } else {
                L.circleMarker([p.lat, p.lon], {
                    color, fillColor: color, fillOpacity: 0.7, radius: 9
                }).addTo(circleGroup).bindPopup(`<b>${p.name}</b>`);
            }
        });
        if (fit && valid.length) {
            try {
                const bounds = L.featureGroup(circleGroup.getLayers()).getBounds();
                if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });
            } catch (e) {}
        }
    }

    // --- Overlap Detection ---
    // Returns array of warning strings describing overlapping include-locations
    function detectOverlaps() {
        const incl = locations.filter(l => l.include);
        const warnings = [];

        const countries = incl.filter(l => l.type === 'country');
        const regions   = incl.filter(l => l.type === 'region');
        const cities    = incl.filter(l => l.type === 'city');
        const zips      = incl.filter(l => l.type === 'zip');

        // City/region/zip inside a country
        countries.forEach(country => {
            regions.forEach(region => {
                if (region.country_code === country.country_code)
                    warnings.push(`"${region.name}" ligger inom landet "${country.name}"`);
            });
            cities.forEach(city => {
                if (city.country_code === country.country_code)
                    warnings.push(`"${city.name}" ligger inom landet "${country.name}"`);
            });
            zips.forEach(zip => {
                if (zip.country_code === country.country_code)
                    warnings.push(`Postnummer "${zip.name}" ligger inom landet "${country.name}"`);
            });
        });

        // City/zip inside a region (match by region name stored on city)
        regions.forEach(region => {
            cities.forEach(city => {
                if (city.region && city.region === region.name && city.country_code === region.country_code)
                    warnings.push(`"${city.name}" ligger inom regionen "${region.name}"`);
            });
            zips.forEach(zip => {
                if (zip.region && zip.region === region.name && zip.country_code === region.country_code)
                    warnings.push(`Postnummer "${zip.name}" ligger inom regionen "${region.name}"`);
            });
        });

        return [...new Set(warnings)];
    }

    function renderOverlapWarning() {
        let el = document.getElementById('overlap-warning');
        const warnings = detectOverlaps();
        if (!warnings.length) {
            if (el) el.remove();
            return false;
        }
        if (!el) {
            el = document.createElement('div');
            el.id = 'overlap-warning';
            el.className = 'notice warn';
            el.style.marginBottom = '10px';
            const calcBtn = document.getElementById('calc-btn');
            calcBtn.parentNode.insertBefore(el, calcBtn);
        }
        el.innerHTML = `<strong>⚠ Överlappande platser — kombinerad räckvidd kan inte beräknas:</strong><ul style="margin-top:6px;padding-left:16px">${warnings.map(w => `<li>${w}</li>`).join('')}</ul><span style="font-size:11px;color:#92400e">Ta bort en av platserna, eller sätt den mer specifika platsen till Exkludera.</span>`;
        return true;
    }

    // --- Meta Reach Estimate API ---
    function buildGeoSpec(locs) {
        const spec = { countries: [], regions: [], cities: [], zips: [], custom_locations: [] };
        locs.forEach(l => {
            if      (l.type === 'country') spec.countries.push(l.country_code);
            else if (l.type === 'region')  spec.regions.push({ key: l.key });
            else if (l.type === 'city')    spec.cities.push(
                l.supports_radius
                    ? { key: l.key, radius: Math.min(80, Math.max(1, l.rad)), distance_unit: 'kilometer' }
                    : { key: l.key }
            );
            else if (l.type === 'zip')     spec.zips.push({ key: l.key });
            else spec.custom_locations.push({
                latitude:      l.lat,
                longitude:     l.lon,
                radius:        Math.min(80, Math.max(1, l.rad)),
                distance_unit: 'kilometer'
            });
        });
        Object.keys(spec).forEach(k => { if (!spec[k].length) delete spec[k]; });
        return spec;
    }

    function getAudienceParams() {
        const ageMin = parseInt(document.getElementById('age-min').value);
        const ageMax = parseInt(document.getElementById('age-max').value);
        const gender = parseInt(document.getElementById('gender').value);
        return {
            age_min: ageMin,
            age_max: ageMax < ageMin ? ageMin : ageMax,
            genders: gender === 0 ? undefined : [gender]
        };
    }

    async function fetchEstimate(version, account, token, geoSpec, excludeSpec) {
        const { age_min, age_max, genders } = getAudienceParams();
        const targetingSpec = { age_min, age_max, geo_locations: geoSpec };
        if (genders) targetingSpec.genders = genders;
        if (excludeSpec) targetingSpec.excluded_geo_locations = excludeSpec;
        const url = `https://graph.facebook.com/${version}/${account}/reachestimate`
                  + `?access_token=${token}`
                  + `&targeting_spec=${encodeURIComponent(JSON.stringify(targetingSpec))}`;
        const res  = await fetch(url);
        const json = await res.json();
        if (json.error) throw new Error(json.error.message);
        return json.data || json;
    }

    async function calculateReach() {
        const token      = document.getElementById('access-token').value.trim();
        const accountRaw = document.getElementById('ad-account-id').value.trim();
        const version    = document.getElementById('api-version').value.trim() || 'v21.0';

        if (!token || !accountRaw) { toggleSettings(); return; }
        const account = accountRaw.startsWith('act_') ? accountRaw : 'act_' + accountRaw;

        const btn = document.getElementById('calc-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Beräknar...';
        document.getElementById('results-panel').style.display = 'none';

        locations.forEach(l => { l.loading = true; l.estimate = null; });
        renderLocations();

        try {
            // Individual estimates (parallel) — always run regardless of overlaps
            const individualPromises = locations.map(async loc => {
                const gs = buildGeoSpec([loc]);
                if (!Object.keys(gs).length) { loc.loading = false; renderLocations(); return; }
                const result = await fetchEstimate(version, account, token, gs);
                loc.estimate = { lower: result.users_lower_bound, upper: result.users_upper_bound };
                loc.loading  = false;
                renderLocations();
            });

            await Promise.all(individualPromises);

            // Total combined estimate — only if no overlaps
            const hasOverlap = renderOverlapWarning();
            if (hasOverlap) {
                // Individual estimates still shown per row, but no combined total
                return;
            }

            const incl     = locations.filter(l => l.include);
            const excl     = locations.filter(l => !l.include);
            const inclGeo  = buildGeoSpec(incl);
            const exclGeo  = excl.length ? buildGeoSpec(excl) : null;

            const total = await fetchEstimate(version, account, token, inclGeo, exclGeo);

            document.getElementById('res-lower').textContent = total.users_lower_bound?.toLocaleString() || '0';
            document.getElementById('res-upper').textContent = total.users_upper_bound?.toLocaleString() || '0';
            const { age_min, age_max, genders } = getAudienceParams();
            const genderLabel = genders ? (genders[0] === 1 ? 'Män' : 'Kvinnor') : 'Alla kön';
            const ageLabel = age_max === 65 ? `${age_min}–65+` : `${age_min}–${age_max}`;
            document.getElementById('res-note').textContent = `Målgrupp: ${genderLabel}, ${ageLabel} år. Total unik räckvidd för alla inkluderade platser kombinerat.`;
            document.getElementById('results-panel').style.display = 'block';

        } catch (err) {
            const s = document.getElementById('search-status');
            s.textContent = 'API-fel: ' + err.message;
            s.className = 'notice warn';
            s.style.display = 'block';
        } finally {
            locations.forEach(l => l.loading = false);
            btn.disabled = false;
            btn.innerHTML = '⚡ Beräkna räckvidd';
            renderLocations();
        }
    }
</script>
